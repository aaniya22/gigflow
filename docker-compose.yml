version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: gigflow-mongo
    ports:
      - '27017:27017'
    volumes:
      - mongo-data:/data/db

  server:
    build: ./server
    container_name: gigflow-server
    ports:
      - '5000:5000'
    environment:
      - MONGO_URI=mongodb://mongodb:27017/gigflow
      - JWT_SECRET=gigflow_super_secret_key_2026
      - JWT_EXPIRES_IN=7d
      - CLIENT_URL=http://localhost
    depends_on:
      - mongodb

  client:
    build: ./client
    container_name: gigflow-client
    ports:
      - '80:80'
    depends_on:
      - server

volumes:
  mongo-data: